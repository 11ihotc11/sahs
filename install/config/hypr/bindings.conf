# Brightness bindings (10% step)
bind = SUPER CTRL B, up, exec, sahs-brightness up 10
bind = SUPER CTRL B, down, exec, sahs-brightness down 10
bind = SUPER CTRL B, c, exec, sahs-brightness get
bind = SUPER CTRL B, m, exec, sahs-brightness max

# Brightness bindings (5% step)
bind = SUPER CTRL ALT B, up, exec, sahs-brightness up 5
bind = SUPER CTRL ALT B, down, exec, sahs-brightness down 5
