# Application bindings
bind = SUPER, RETURN, exec, kitty
bind = SUPER SHIFT, F, exec, dolphin
bind = SUPER SHIFT, L, exec, librewolf --browser
bind = SUPER ALT SHIFT, L, exec, librewolf --private-window
bind = SUPER, SPACE, exec, wofi --show drun
bind = SUPER, W, killactive
bind = $mainMod, ESCAPE, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

