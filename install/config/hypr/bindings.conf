# Brightness bindings
bind = SUPER, F1, exec, brightnessctl set 10%- && notify-send "Brightness" "$(brightnessctl g)"

bind = SUPER, F2, exec, brightnessctl set +10% && notify-send "Brightness" "$(brightnessctl g)"

bind = SUPER CTRL, F1, exec, brightnessctl set 5%- && notify-send "Brightness" "$(brightnessctl g)"

bind = SUPER CTRL, F2, exec, brightnessctl set +5% && notify-send "Brightness" "$(brightnessctl g)"
